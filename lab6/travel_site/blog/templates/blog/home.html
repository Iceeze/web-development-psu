{% extends 'blog/index.html' %}

{% block content %}
    <h1>Последние записи</h1>
    {% for post in posts %}
        <article>
            <h2><a id="post-title" href="{% url 'post_detail' post.id %}">{{ post.title }}</a></h2>
            <p style="color: gray;">Опубликовано: {{ post.created_at|date:"d.m.Y" }}</p>
            <p>{{ post.content|truncatewords:20 }}</p>
        </article>
    {% empty %}
        <p>Записей пока нет.</p>
    {% endfor %}
{% endblock %}
