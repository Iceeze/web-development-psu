{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог путешественника</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="{% url 'home' %}">TravelBlog</a></div>
            <ul>
                <li><a href="{% url 'home' %}">Главная</a></li>
                <li><a href="{% url 'cities_list' %}">Достопримечательности</a></li>
                <li><a href="{% url 'about' %}">О нас</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <main class="content">
            {% block content %}{% endblock %}
        </main>
        
        <aside class="sidebar">
            <h3>Текущее время</h3>
            <div id="clock">Загрузка...</div>

            <h3>Популярные места</h3>
            <div id="slider">Париж</div>
        </aside>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString('ru-RU');
        }, 1000);

        const slides = ["Париж", "Рим", "Токио", "Алтай"];
        const colors = ["#ffadad", "#ffd6a5", "#caffbf", "#9bf6ff"];
        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % slides.length;
            const sliderElement = document.getElementById('slider');
            sliderElement.innerText = slides[currentSlide];
            sliderElement.style.backgroundColor = colors[currentSlide];
        }, 2000);
    </script>

</body>
</html>
